name: "📦 Builder: Empaquetar y Fabricar (Battlellama SDK)"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Nombre de la imagen resultante (ej. tabeku-backend)"
        required: true
        type: string
      dockerfile-path:
        description: "Ruta al fichero Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Directorio base desde donde se compila"
        required: false
        type: string
        default: "."

jobs:
  build-and-push:
    name: "Construir Contenedor Cloud-Native"
    runs-on: ubuntu-latest
    
    # PERMISOS ESTRICTOS: Al no usar Deploy Tokens fijos, GitHub genera un Token efímero de lectura.
    # Exigimos 'packages: write' para insertar la imagen final dentro del GitHub del cliente temporalmente.
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: "Clonar Código del Cliente"
        uses: actions/checkout@v4

      - name: "Preparar Motor de Caché (Docker Buildx)"
        uses: docker/setup-buildx-action@v3

      - name: "Autenticar Automáticamente en GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Generar Identificadores y Etiquetas (GITOPS Ready)"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            # Este sha 'largo' es vital para que ArgoCD Image Updater enganche exacto el commit.
            type=sha,prefix=,format=long 
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: "Compilar Código y Subir Contenedor al Registro"
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Aprovechamos la caché nativa de GitHub (Ahorra facturación a la cuenta)
          cache-to: type=gha,mode=max
