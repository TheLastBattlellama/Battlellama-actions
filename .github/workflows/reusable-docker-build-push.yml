name: "📦 Builder: Package and Ship (Battlellama SDK)"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Target image name (e.g. tabeku-backend)"
        required: true
        type: string
      dockerfile-path:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build-context:
        description: "Base directory for docker build context"
        required: false
        type: string
        default: "."

jobs:
  build-and-push:
    name: "Build Cloud-Native Container"
    runs-on: ubuntu-latest
    
    # STRICT PERMISSIONS: Instead of fixed deploy tokens, GitHub issues an ephemeral token.
    # 'packages: write' is required to push the final Docker image to GHCR securely.
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4

      - name: "Setup caching engine (Docker Buildx)"
        uses: docker/setup-buildx-action@v3

      - name: "Zero-Trust GHCR Authentication"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Generate tags and metadata (GitOps Ready)"
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ inputs.image-name }}
          tags: |
            # Full SHA tag is absolutely required for ArgoCD Image Updater precise tracking
            type=sha,prefix=,format=long 
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: "Compile and Push OCI Image"
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Leverage GitHub native caching to reduce CI billable minutes
          cache-to: type=gha,mode=max
