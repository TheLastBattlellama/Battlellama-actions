# ─────────────────────────────────────────────────────────
# 🛡️ IaC Scan — Trivy Config for Kubernetes/Terraform/CloudFormation
# ─────────────────────────────────────────────────────────
# Scans Infrastructure as Code for security misconfigurations.
# Supports Kustomize rendering: auto-discovers kustomization.yaml files,
# builds them into plain YAML, and scans the rendered output.
#
# Usage:
#   uses: TheLastBattlellama/Battlellama-actions/.github/workflows/iac-scan.yml@main
#   with:
#     use-kustomize: "true"
#     exit-code: "1"

name: "🛡️ IaC Scan"

on:
  workflow_call:
    inputs:
      scan-path:
        description: "Path to scan (used when use-kustomize is false)"
        default: "."
        required: false
        type: string
      exit-code:
        description: "1 = block pipeline on findings, 0 = warn only"
        default: "1"
        required: false
        type: string
      severity:
        description: "Severities to flag (CRITICAL, HIGH, MEDIUM, LOW)"
        default: "CRITICAL,HIGH"
        required: false
        type: string
      skip-files:
        description: "Comma-separated files to skip"
        default: ""
        required: false
        type: string
      use-kustomize:
        description: "Auto-discover and render kustomization.yaml files before scanning"
        default: "false"
        required: false
        type: string
      kustomize-exclude-dirs:
        description: "Comma-separated directories to exclude from kustomize rendering"
        default: ""
        required: false
        type: string
      kustomize-mount-template:
        description: "Template directory to mount at apps/__scan_test/ for path resolution"
        default: ""
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  iac-scan:
    name: "Infrastructure Misconfiguration Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: "Render Kustomize Targets"
        if: ${{ inputs.use-kustomize == 'true' }}
        run: |
          mkdir -p ./.trivy-rendered

          # Mount template at correct depth for kustomize path resolution
          if [ -n "${{ inputs.kustomize-mount-template }}" ] && [ -d "./${{ inputs.kustomize-mount-template }}" ]; then
            echo "Mounting ${{ inputs.kustomize-mount-template }} at apps/__scan_test/..."
            cp -r "./${{ inputs.kustomize-mount-template }}" ./apps/__scan_test
          fi

          # Build exclude args from comma-separated input (array, no eval)
          FIND_ARGS=(-type f -name 'kustomization.yaml' -not -path '*/.*')
          if [ -n "${{ inputs.kustomize-exclude-dirs }}" ]; then
            IFS=',' read -ra DIRS <<< "${{ inputs.kustomize-exclude-dirs }}"
            for dir in "${DIRS[@]}"; do
              dir=$(echo "$dir" | xargs)
              FIND_ARGS+=(-not -path "./$dir/*")
            done
          fi

          find . "${FIND_ARGS[@]}" | while IFS= read -r file; do
            dir=$(dirname "$file")
            filename=$(echo "$dir" | sed -e 's/^\.\///' -e 's/\//-/g')
            echo "Building $dir into $filename.yaml..."
            # 2>/dev/null: prevent kustomize warnings from corrupting rendered YAML
            kubectl kustomize "$dir" > "./.trivy-rendered/$filename.yaml" 2>/dev/null \
              || echo "⚠️ Failed to render $dir (skipping)"
          done

          # Cleanup temp mount
          rm -rf ./apps/__scan_test 2>/dev/null
          echo "Kustomize build complete."

      - name: "IaC Scan (Trivy Config — SARIF)"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: ${{ inputs.use-kustomize == 'true' && './.trivy-rendered' || inputs.scan-path }}
          format: 'sarif'
          output: 'trivy-iac-results.sarif'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true
          skip-files: ${{ inputs.skip-files }}

      - name: "Upload SARIF"
        if: always()
        continue-on-error: true  # SARIF upload requires GHAS on private repos; degrades gracefully
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-iac-results.sarif
          category: iac-scan

      - name: "Enforce Gate"
        if: ${{ inputs.exit-code == '1' }}
        env:
          SEVERITY: ${{ inputs.severity }}
          SCAN_REF: ${{ inputs.use-kustomize == 'true' && './.trivy-rendered' || inputs.scan-path }}
          SKIP_FILES: ${{ inputs.skip-files }}
        run: |
          args=(--exit-code 1 --severity "$SEVERITY" --ignore-unfixed)
          if [ -n "$SKIP_FILES" ]; then
            args+=(--skip-files "$SKIP_FILES")
          fi
          trivy config "${args[@]}" "$SCAN_REF"
