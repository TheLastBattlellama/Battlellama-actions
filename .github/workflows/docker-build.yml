# ─────────────────────────────────────────────────────────
# 📦 Docker Build & Push — Build, tag, scan, and push to GHCR
# ─────────────────────────────────────────────────────────
# Builds a Docker image, pushes to GHCR, and optionally scans it for CVEs.
# Tags are GitOps-ready: SHA (for Image Updater), semver, latest.
#
# Usage:
#   uses: TheLastBattlellama/Battlellama-actions/.github/workflows/docker-build.yml@main
#   with:
#     image-name: "my-app"
#   secrets: inherit

name: "📦 Docker Build & Push"

on:
  workflow_call:
    inputs:
      image-name:
        description: "Image name without registry prefix (e.g. 'my-app' → ghcr.io/<owner>/my-app)"
        required: true
        type: string
      dockerfile-path:
        description: "Path to Dockerfile"
        default: "./Dockerfile"
        required: false
        type: string
      build-context:
        description: "Docker build context directory"
        default: "."
        required: false
        type: string
      build-args:
        description: "Docker build arguments (one per line, KEY=VALUE format)"
        default: ""
        required: false
        type: string
      platforms:
        description: "Target platforms (e.g. 'linux/amd64,linux/arm64')"
        default: "linux/amd64"
        required: false
        type: string
      push:
        description: "Push image to registry (false = dry-run build)"
        default: true
        required: false
        type: boolean
      scan-after-build:
        description: "Run Trivy CVE scan on the built image"
        default: true
        required: false
        type: boolean
      scan-severity:
        description: "Trivy scan severity filter"
        default: "CRITICAL,HIGH"
        required: false
        type: string
      scan-exit-code:
        description: "1 = fail pipeline on CVE findings, 0 = warn only"
        default: "1"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  docker-build:
    name: "Build & Push OCI Image"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout"
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: "Setup Docker Buildx"
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: "Login to GHCR"
        if: ${{ inputs.push }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Normalize owner to lowercase"
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: "Generate Image Metadata"
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6
        with:
          images: ghcr.io/${{ steps.owner.outputs.name }}/${{ inputs.image-name }}
          tags: |
            type=sha,prefix=,format=long
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: "Build & Push"
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          push: ${{ inputs.push }}
          load: ${{ !inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build-args }}
          platforms: ${{ inputs.push && inputs.platforms || 'linux/amd64' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: ${{ inputs.push }}
          provenance: ${{ inputs.push && 'mode=max' || 'false' }}

      - name: "Resolve scan image ref"
        id: ref
        run: |
          if [ "$PUSH" = "true" ]; then
            echo "image=ghcr.io/${OWNER}/${IMAGE_NAME}@${DIGEST}" >> "$GITHUB_OUTPUT"
          else
            # load=true: use the first tag from metadata (the sha tag)
            echo "image=$(echo '${{ steps.meta.outputs.tags }}' | head -n1)" >> "$GITHUB_OUTPUT"
          fi
        env:
          PUSH: ${{ inputs.push && 'true' || 'false' }}
          OWNER: ${{ steps.owner.outputs.name }}
          IMAGE_NAME: ${{ inputs.image-name }}
          DIGEST: ${{ steps.build.outputs.digest }}

      - name: "Image CVE Scan (Trivy — SARIF)"
        if: ${{ inputs.scan-after-build }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: 'sarif'
          output: trivy-image-results.sarif
          severity: ${{ inputs.scan-severity }}
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: "Upload Image Scan SARIF"
        if: always()
        continue-on-error: true  # SARIF upload requires GHAS on private repos; degrades gracefully
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357  # v3
        with:
          sarif_file: trivy-image-results.sarif
          category: docker-image

      - name: "Enforce Image Scan Gate"
        if: ${{ inputs.scan-after-build && inputs.scan-exit-code == '1' }}
        env:
          IMAGE_REF: ${{ steps.ref.outputs.image }}
          SEVERITY: ${{ inputs.scan-severity }}
        run: |
          trivy image \
            --format table \
            --severity "$SEVERITY" \
            --ignore-unfixed \
            --ignorefile .trivyignore \
            --exit-code 1 \
            "$IMAGE_REF"
