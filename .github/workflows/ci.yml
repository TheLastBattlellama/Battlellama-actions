# ─────────────────────────────────────────────────────────
# 🔍 CI — Lint & Integration Tests
# ─────────────────────────────────────────────────────────
# Validates workflow files and runs integration tests against
# clean fixtures before changes reach users of this action library.
#
# Jobs:
#   lint         — actionlint (catches expression errors, shellcheck issues)
#   validate-semgrep-configs — verifies all referenced registry packs exist
#   test-sast-js — calls sast-javascript.yml against tests/fixtures/js
#   test-sast-py-* — calls sast-python.yml against tests/fixtures/python

name: "🔍 CI"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint workflows (actionlint)"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Run actionlint"
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12

  validate-semgrep-configs:
    name: "Validate Semgrep registry configs"
    timeout-minutes: 10
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: "Check registry packs"
        run: |
          configs=(
            p/python
            p/django
            p/fastapi
            p/flask
            p/bandit
            p/security-audit
            p/javascript
            p/typescript
            p/react
            p/nextjs
            p/expressjs
          )

          for config in "${configs[@]}"; do
            status=$(curl -sS -o /dev/null -w '%{http_code}' "https://semgrep.dev/c/$config")
            if [ "$status" != "200" ]; then
              echo "Semgrep config '$config' returned HTTP $status"
              exit 1
            fi
          done

  test-sast-js:
    name: "Integration: SAST JavaScript"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-javascript.yml
    with:
      framework: react
      scan-path: tests/fixtures/js

  test-sast-python-generic:
    name: "Integration: SAST Python (generic)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: generic
      scan-path: tests/fixtures/python

  test-sast-python-django:
    name: "Integration: SAST Python (django)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: django
      scan-path: tests/fixtures/python

  test-sast-python-fastapi:
    name: "Integration: SAST Python (fastapi)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: fastapi
      scan-path: tests/fixtures/python

  test-sast-python-flask:
    name: "Integration: SAST Python (flask)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: flask
      scan-path: tests/fixtures/python
