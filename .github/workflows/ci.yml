# ─────────────────────────────────────────────────────────
# 🔍 CI — Lint & Integration Tests
# ─────────────────────────────────────────────────────────
# Validates workflow files and runs integration tests against
# clean fixtures before changes reach users of this action library.
#
# Jobs:
#   lint                     — actionlint (catches expression errors, shellcheck issues)
#   validate-semgrep-configs — verifies all referenced registry packs exist
#   test-sast-js             — sast-javascript.yml against tests/fixtures/js
#   test-sast-py-*           — sast-python.yml against tests/fixtures/python
#   test-security-scan       — security-scan.yml against repo root (warn-only)
#   test-gitleaks            — gitleaks.yml against repo (warn-only, PR diff aware)
#   test-iac-scan            — iac-scan.yml against tests/fixtures/iac (warn-only)
#   test-docker-build        — docker-build.yml dry-run (push:false, scan disabled)

name: "🔍 CI"

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint workflows (actionlint)"
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: "Run actionlint"
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12

  validate-semgrep-configs:
    name: "Validate Semgrep registry configs"
    timeout-minutes: 10
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: "Check registry packs"
        run: |
          configs=(
            p/python
            p/django
            p/fastapi
            p/flask
            p/bandit
            p/security-audit
            p/javascript
            p/typescript
            p/react
            p/nextjs
            p/expressjs
          )

          for config in "${configs[@]}"; do
            status=$(curl -sS -o /dev/null -w '%{http_code}' "https://semgrep.dev/c/$config")
            if [ "$status" != "200" ]; then
              echo "Semgrep config '$config' returned HTTP $status"
              exit 1
            fi
          done

  test-sast-js:
    name: "Integration: SAST JavaScript"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-javascript.yml
    with:
      framework: react
      scan-path: tests/fixtures/js

  test-sast-python-generic:
    name: "Integration: SAST Python (generic)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: generic
      scan-path: tests/fixtures/python

  test-sast-python-django:
    name: "Integration: SAST Python (django)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: django
      scan-path: tests/fixtures/python

  test-sast-python-fastapi:
    name: "Integration: SAST Python (fastapi)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: fastapi
      scan-path: tests/fixtures/python

  test-sast-python-flask:
    name: "Integration: SAST Python (flask)"
    needs: [lint, validate-semgrep-configs]
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/sast-python.yml
    with:
      framework: flask
      scan-path: tests/fixtures/python

  test-security-scan:
    name: "Integration: Security Scan"
    needs: lint
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/security-scan.yml
    with:
      exit-code: "0"  # warn-only: repo has no real CVEs but avoids false-positive blocks

  test-gitleaks:
    name: "Integration: Gitleaks"
    needs: lint
    permissions:
      contents: read
    uses: ./.github/workflows/gitleaks.yml
    with:
      exit-code: "0"  # warn-only: CI repo itself is clean but avoids edge cases

  test-iac-scan:
    name: "Integration: IaC Scan"
    needs: lint
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/iac-scan.yml
    with:
      scan-path: tests/fixtures/iac
      exit-code: "0"  # warn-only: fixture is clean but Trivy rules evolve

  test-docker-build:
    name: "Integration: Docker Build (dry-run)"
    needs: lint
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/docker-build.yml
    with:
      image-name: "ci-test"
      dockerfile-path: "tests/fixtures/docker/Dockerfile"
      push: false
      scan-after-build: false  # no registry push — image scan requires pushed digest
