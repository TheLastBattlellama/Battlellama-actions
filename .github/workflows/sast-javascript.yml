# ─────────────────────────────────────────────────────────
# ⚛️ SAST JavaScript/TypeScript — Semgrep for React, Node, Express
# ─────────────────────────────────────────────────────────
# Static Application Security Testing for JS/TS projects.
# Detects XSS, prototype pollution, insecure dependencies, etc.
#
# Usage:
#   uses: TheLastBattlellama/Battlellama-actions/.github/workflows/sast-javascript.yml@main
#   with:
#     framework: "react"    # react | nextjs | express | generic

name: "⚛️ SAST JavaScript"

on:
  workflow_call:
    inputs:
      framework:
        description: "JS/TS framework (react, nextjs, express, generic)"
        default: "generic"
        required: false
        type: string
      exit-code:
        description: "1 = block pipeline on findings, 0 = warn only"
        default: "1"
        required: false
        type: string
      scan-path:
        description: "Path to scan"
        default: "."
        required: false
        type: string
      extra-rules:
        description: "Additional Semgrep rulesets (comma-separated)"
        default: ""
        required: false
        type: string

permissions:
  contents: read
  security-events: write

jobs:
  sast-javascript:
    name: "JS/TS SAST (${{ inputs.framework }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Build Ruleset"
        id: rules
        env:
          FRAMEWORK: ${{ inputs.framework }}
          EXTRA_RULES: ${{ inputs.extra-rules }}
        run: |
          RULES="p/javascript p/typescript"

          case "$FRAMEWORK" in
            react)    RULES="$RULES p/react" ;;
            nextjs)   RULES="$RULES p/react p/nextjs" ;;
            express)  RULES="$RULES p/expressjs" ;;
          esac

          # Always include security baseline
          RULES="$RULES p/security-audit"

          # Append extra rules
          if [ -n "$EXTRA_RULES" ]; then
            IFS=',' read -ra EXTRA <<< "$EXTRA_RULES"
            for rule in "${EXTRA[@]}"; do
              RULES="$RULES $(echo "$rule" | xargs)"
            done
          fi

          echo "rules=$RULES" >> "$GITHUB_OUTPUT"
          echo "Using rulesets: $RULES"

      - name: "Semgrep SAST"
        id: semgrep
        run: |
          pip install semgrep==1.167.0 --quiet
          configs=()
          for config in $SEMGREP_RULES; do
            configs+=(--config "$config")
          done
          # Single scan: emit SARIF for Security tab + capture exit code for gate.
          # --error makes semgrep exit 1 on findings; capture via || so set -e
          # (bash -eo pipefail) doesn't abort before we write the gate output.
          exit_code=0
          semgrep scan "${configs[@]}" --error --sarif --output semgrep-js.sarif "$SCAN_PATH" || exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        env:
          SEMGREP_RULES: ${{ steps.rules.outputs.rules }}
          SCAN_PATH: ${{ inputs.scan-path }}
        continue-on-error: true  # gate enforced below; don't short-circuit SARIF upload

      - name: "Upload SARIF"
        if: always()
        continue-on-error: true  # SARIF upload requires GHAS on private repos; degrades gracefully
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
        with:
          sarif_file: semgrep-js.sarif
          category: sast-javascript

      - name: "Enforce Gate"
        if: ${{ inputs.exit-code == '1' && steps.semgrep.outputs.exit_code != '0' }}
        run: |
          echo "Semgrep found findings (exit ${{ steps.semgrep.outputs.exit_code }}). Blocking pipeline."
          exit 1
