# ─────────────────────────────────────────────────────────
# 🔑 Secret Scan — Gitleaks (standalone)
# ─────────────────────────────────────────────────────────
# Standalone secret scanning workflow, invocable independently from
# security-scan.yml. Ideal as a required PR check that runs fast
# without pulling in Trivy FS dependency scanning.
#
# Usage:
#   uses: TheLastBattlellama/Battlellama-actions/.github/workflows/gitleaks.yml@main
#
# Caller pattern — warn on PR, block on push:
#   with:
#     exit-code: ${{ github.event_name == 'pull_request' && '0' || '1' }}

name: "🔑 Secret Scan"

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: "Git fetch depth (0 = full history, required for push scans)"
        default: "0"
        required: false
        type: string
      exit-code:
        description: "1 = block pipeline on findings, 0 = warn only"
        default: "1"
        required: false
        type: string

permissions:
  contents: read

jobs:
  gitleaks:
    name: "Gitleaks Secret Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ inputs.fetch-depth }}

      - name: "Secret Scanning (Gitleaks CLI)"
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks

          # On PRs: scan only the diff (origin/<base>..HEAD) to avoid rescanning full history
          if [ -n "$BASE_REF" ]; then
            LOG_OPTS="origin/${BASE_REF}..HEAD"
            echo "PR mode: scanning commits ${LOG_OPTS}"
            gitleaks detect --source . --redact --log-opts "$LOG_OPTS" --exit-code "${EXIT_CODE}"
          else
            gitleaks detect --source . --redact --exit-code "${EXIT_CODE}"
          fi
        env:
          EXIT_CODE: ${{ inputs.exit-code }}
          BASE_REF: ${{ github.base_ref }}
