# ─────────────────────────────────────────────────────────
# 🔨 Build Security Scanner — Docker Image
# ─────────────────────────────────────────────────────────
# Builds and publishes the security-scanner image to GHCR.
#
# Triggers:
#   - Push to main touching security-scanner/**
#   - Manual dispatch (workflow_dispatch)
#
# Image: ghcr.io/thelastbattlellama/security-scanner
# Tags:  latest  +  <git-sha>
# Platforms: linux/amd64, linux/arm64 (Apple Silicon compatible)

name: "🔨 Build Security Scanner"

on:
  push:
    branches: [main]
    paths:
      - "security-scanner/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@v3

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push"
        uses: docker/build-push-action@v6
        with:
          context: security-scanner/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/thelastbattlellama/security-scanner:latest
            ghcr.io/thelastbattlellama/security-scanner:${{ github.sha }}
