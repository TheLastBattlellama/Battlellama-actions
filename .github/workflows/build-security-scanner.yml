# ─────────────────────────────────────────────────────────
# 🔨 Build Security Scanner — Docker Image
# ─────────────────────────────────────────────────────────
# Builds and publishes the security-scanner image to GHCR.
#
# Triggers:
#   - Push to main touching security-scanner/**
#   - Manual dispatch (workflow_dispatch)
#
# Image: ghcr.io/thelastbattlellama/security-scanner
# Tags:  latest  +  <git-sha>
# Platforms: linux/amd64, linux/arm64 (Apple Silicon compatible)

name: "🔨 Build Security Scanner"

on:
  push:
    branches: [main]
    paths:
      - "security-scanner/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: "Build & Push"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: "Set up QEMU"
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3  # v4

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4

      - name: "Login to GHCR"
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build and Push"
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7
        with:
          context: security-scanner/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/thelastbattlellama/security-scanner:latest
            ghcr.io/thelastbattlellama/security-scanner:${{ github.sha }}
          sbom: true
          provenance: mode=max

      - name: "Scan Security Scanner Image (Trivy)"
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ghcr.io/thelastbattlellama/security-scanner:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '1'
