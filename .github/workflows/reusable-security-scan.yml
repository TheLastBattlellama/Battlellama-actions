name: "✅ DevSecOps: Static Audit (Battlellama SDK)"

on:
  workflow_call:
    # No external secrets needed. Runs isolated in the host repository.

# ENFORCED BEST PRACTICE: Principle of Least Privilege
permissions:
  contents: read

jobs:
  security-audit:
    name: "Static Analysis (SAST & Vulnerabilities)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout source code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to audit full git history for leaked secrets

      - name: "Secret Scanning (Gitleaks)"
        # Fails the build immediately if exposed passwords, tokens or API keys are found
        uses: gitleaks/gitleaks-action@v2.3.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false 
          GITLEAKS_ENABLE_SUMMARY: true

      - name: "Vulnerability Scanning (Trivy FS)"
        # Scans dependencies and files for high-impact CVEs
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH' # Focus on real infrastructure threats
          ignore-unfixed: true
          exit-code: '1' # CRITICAL: Enforces patching by failing the workflow
