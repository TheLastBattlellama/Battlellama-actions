# ─────────────────────────────────────────────────────────
# 🛡️ Security Scan — Gitleaks + Trivy FS
# ─────────────────────────────────────────────────────────
# Language-agnostic scan for leaked secrets and dependency vulnerabilities.
# Should run BEFORE building Docker images — fail fast, shift left.
#
# For language-specific SAST, add sast-python.yml or sast-javascript.yml
#
# Usage:
#   uses: TheLastBattlellama/Battlellama-actions/.github/workflows/security-scan.yml@main

name: "🛡️ Security Scan"

on:
  workflow_call:
    inputs:
      severity:
        description: "Severities to flag for Trivy (CRITICAL, HIGH, MEDIUM, LOW)"
        default: "CRITICAL,HIGH"
        required: false
        type: string
      exit-code:
        description: "1 = block pipeline on findings, 0 = warn only"
        default: "1"
        required: false
        type: string
      scan-path:
        description: "Path to scan for vulnerabilities"
        default: "."
        required: false
        type: string
      gitleaks-enabled:
        description: "Enable Gitleaks secret scanning"
        default: "true"
        required: false
        type: string
      trivy-fs-enabled:
        description: "Enable Trivy filesystem vulnerability scanning"
        default: "true"
        required: false
        type: string

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security-scan:
    name: "Secrets & Dependency Scan"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history required for Gitleaks

      - name: "Secret Scanning (Gitleaks CLI)"
        if: ${{ inputs.gitleaks-enabled == 'true' }}
        run: |
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks detect --source . --redact --exit-code "${EXIT_CODE}"
        env:
          EXIT_CODE: ${{ inputs.exit-code }}

      - name: "Dependency Scanning (Trivy FS SARIF)"
        if: ${{ inputs.trivy-fs-enabled == 'true' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.scan-path }}
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: ${{ inputs.severity }}
          ignore-unfixed: true

      - name: "Upload Trivy FS SARIF"
        if: always()
        continue-on-error: true  # SARIF upload requires GHAS on private repos; degrades gracefully
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs-results.sarif

      - name: "Enforce Trivy FS Gate"
        if: ${{ inputs.exit-code == '1' && inputs.trivy-fs-enabled == 'true' }}
        run: |
          trivy fs --exit-code 1 --severity "$SEVERITY" --ignore-unfixed "$SCAN_PATH"
        env:
          SEVERITY: ${{ inputs.severity }}
          SCAN_PATH: ${{ inputs.scan-path }}
